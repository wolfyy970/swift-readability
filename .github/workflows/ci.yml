name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-linux:
    name: Native Linux compatibility
    runs-on: ubuntu-24.04
    container: swift:6.2
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Report toolchain
        run: swift --version
      - name: Native release tests with warnings as errors
        run: swift test -c release -Xswiftc -warnings-as-errors

  swift:
    name: Native, differential, and benchmark gates
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tests/JavaScript/package-lock.json
      - name: Report toolchain
        run: swift --version
      - name: Resolve locked dependencies
        run: |
          swift package resolve
          git diff --exit-code Package.resolved
          grep -q '"version" : "2.13.6"' Package.resolved
          grep -q '"version" : "0.4.2"' Package.resolved
      - name: Native release tests with warnings as errors
        run: swift test -c release -Xswiftc -warnings-as-errors
      - name: Install reference-test dependencies
        run: npm --prefix Tests/JavaScript ci
      - name: Compare every native result with pinned Mozilla
        run: npm --prefix Tests/JavaScript run test:differential
      - name: Fail-closed benchmark smoke
        run: swift run -c release SwiftReadabilityBench --iterations 1 --warmup 0 --filter qq --summary-only

  javascript-reference:
    name: JavaScript reference parity
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Tests/JavaScript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tests/JavaScript/package-lock.json
      - name: Install reference-test dependencies
        run: npm ci
      - name: Run all shared fixtures
        run: npm test
