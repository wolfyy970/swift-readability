[tasks."test:swift"]
description = "Run the Swift Readability fixture and API tests"
run = """
set -euo pipefail
swift test -q
"""

[tasks."test:javascript"]
description = "Run the JavaScript Readability parity suite against the shared fixture manifest"
run = """
set -euo pipefail
npm --prefix Tests/JavaScript ci

if [ -z "${SWIFT_READABILITY_FIXTURES:-}" ] && [ -z "${SWIFT_READABILITY_FIXTURE_REGEX:-}" ]; then
  export SWIFT_READABILITY_FIXTURE_REGEX='.*'
fi

npm --prefix Tests/JavaScript test
"""

[tasks."test:differential"]
description = "Compare every observable native result with pinned Mozilla Readability"
depends = ["test:javascript"]
run = """
set -euo pipefail
npm --prefix Tests/JavaScript run test:differential
"""

[tasks."test:parity"]
description = "Run native, reference, and direct differential Readability gates"
depends = ["test:swift", "test:differential"]
